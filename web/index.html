<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PSC Indicadores MVP</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <!-- PSC_VERSION: sempre atualizar este marcador visual quando houver release funcional relevante. -->
      <h1 class="page-title">Gestao de Indicadores <span class="version-badge">V1</span></h1>
      <p class="subtitle">MVP simples para gestores de area e executivos</p>

      <section id="status" class="status"></section>

      <section id="login-section" class="card">
        <h2>Login</h2>
        <form id="login-form" class="form-grid">
          <label>
            Email
            <input id="email" type="email" required />
          </label>
          <label>
            Senha
            <input id="password" type="password" required />
          </label>
          <button type="submit">Entrar</button>
        </form>
      </section>

      <section id="dashboard" class="hidden">
        <div class="toolbar card">
          <div>
            <strong id="user-name"></strong>
            <span id="user-role" class="muted"></span>
          </div>
          <div class="toolbar-actions">
            <label>
              Ano
              <input id="year-input" type="number" min="2000" max="2100" />
            </label>
            <button id="reload-btn" type="button">Recarregar</button>
            <button id="shutdown-btn" type="button" class="danger hidden">Encerrar app</button>
            <button id="logout-btn" type="button" class="danger">Sair</button>
          </div>
        </div>

        <section class="card">
          <h2>Indicadores</h2>
          <div id="executive-filters" class="toolbar-actions hidden filters-row">
            <label>
              Buscar indicador
              <input
                id="exec-indicator-filter"
                type="text"
                placeholder="Ex: faturamento"
              />
            </label>
            <label>
              Filtrar por area
              <select id="exec-area-filter" multiple size="4"></select>
            </label>
          </div>
          <div id="executive-area-actions" class="toolbar-actions hidden indicator-admin-actions">
            <button id="exec-add-area-btn" type="button">Adicionar Area</button>
            <button id="exec-edit-areas-btn" type="button">Editar Areas</button>
            <button id="exec-delete-areas-btn" type="button" class="danger">Apagar Areas</button>
            <span id="exec-area-mode-hint" class="muted"></span>
          </div>
          <div id="executive-indicator-actions" class="toolbar-actions hidden indicator-admin-actions">
            <button id="exec-add-indicator-btn" type="button">Adicionar Indicador</button>
            <button id="exec-edit-indicators-btn" type="button">Editar Indicadores</button>
            <button id="exec-delete-indicators-btn" type="button" class="danger">Apagar Indicadores</button>
            <span id="exec-indicator-mode-hint" class="muted"></span>
          </div>
          <div class="table-wrap">
            <table id="indicators-table"></table>
          </div>
        </section>

        <section id="weekly-panel" class="card hidden">
          <h2>Valores semanais</h2>
          <p id="weekly-title" class="muted"></p>
          <form id="weekly-form" class="week-grid"></form>
        </section>

        <section id="action-plan-panel" class="card hidden">
          <h2>Novo plano de acao</h2>
          <p id="action-plan-indicator" class="muted"></p>
          <form id="action-plan-form" class="form-grid">
            <input id="ap-indicator-id" type="hidden" />
            <label>
              Titulo
              <input id="ap-title" required />
            </label>
            <label>
              Ocorrencia
              <textarea id="ap-ocorrencia" required></textarea>
            </label>
            <label>
              Identificacao da causa
              <textarea id="ap-causa" required></textarea>
            </label>
            <label>
              Proposta da solucao
              <textarea id="ap-solucao" required></textarea>
            </label>
            <label>
              Responsavel (Bitrix24)
              <input
                id="ap-responsible-search"
                autocomplete="off"
                placeholder="Digite pelo menos 2 letras para buscar"
                required
              />
              <input id="ap-bitrix-user-id" type="hidden" />
              <div id="ap-user-suggestions" class="suggestions hidden"></div>
              <small id="ap-selected-user" class="muted"></small>
            </label>
            <label>
              Prazo
              <input id="ap-due-date" type="date" />
            </label>
            <button type="submit">Salvar plano de acao</button>
          </form>
        </section>

        <section id="create-indicator-panel" class="card hidden">
          <h2 id="create-indicator-title">Cadastrar indicador</h2>
          <form id="create-indicator-form" class="form-grid">
            <input id="ci-indicator-id" type="hidden" />
            <label>
              Area
              <select id="ci-area" required></select>
            </label>
            <label>
              Nome
              <input id="ci-name" required />
            </label>
            <label>
              Descricao
              <textarea id="ci-description"></textarea>
            </label>
            <label>
              Agregacao
              <select id="ci-aggregation" required>
                <option value="sum">Soma</option>
                <option value="avg">Media ponderada</option>
                <option value="latest">Ultima faixa preenchida</option>
              </select>
            </label>
            <label>
              Unidade
              <select id="ci-unit-id" required></select>
            </label>
            <div class="toolbar-actions">
              <button id="ci-submit" type="submit">Salvar indicador</button>
              <button id="ci-cancel" type="button">Cancelar</button>
            </div>
          </form>
        </section>
      </section>

      <!-- Monthly Planning Modal -->
      <section id="monthly-planning-panel" class="card hidden modal-overlay">
        <div class="modal-content">
          <h2>Planejamento Mensal</h2>
          <p id="monthly-planning-title" class="muted"></p>
          <form id="monthly-planning-form" class="form-grid">
            <input id="mp-indicator-id" type="hidden" />
            <input id="mp-year" type="hidden" />
            <input id="mp-month" type="hidden" />

            <div id="mp-projected-group" class="hidden">
              <label>
                Valor Projetado
                <input id="mp-projected-value" type="number" step="0.01" />
              </label>
            </div>

            <div id="mp-target-group" class="hidden">
              <label>
                Meta Mensal
                <input id="mp-target-value" type="number" step="0.01" min="0" />
              </label>
            </div>

            <div class="toolbar-actions">
              <button id="mp-submit" type="submit">Salvar</button>
              <button id="mp-cancel" type="button" class="secondary">Cancelar</button>
            </div>
          </form>
        </div>
      </section>

      <!-- Area Management Modal -->
      <section id="area-management-panel" class="card hidden modal-overlay">
        <div class="modal-content">
          <h2>Gerenciar Areas</h2>

          <div class="area-management-tabs">
            <button type="button" class="area-tab-btn active" data-tab="create">Criar Area</button>
            <button type="button" class="area-tab-btn" data-tab="edit">Editar Area</button>
            <button type="button" class="area-tab-btn" data-tab="delete">Apagar Area</button>
          </div>

          <!-- Create Tab -->
          <div id="area-tab-create" class="area-tab-content">
            <form id="area-create-form" class="form-grid">
              <label>
                Nome da Area
                <input id="ac-name" type="text" required />
              </label>
              <label>
                Cor da Area
                <input id="ac-color" class="color-input" type="color" value="#1d4ed8" />
              </label>
              <div class="toolbar-actions">
                <button type="submit">Criar Area</button>
              </div>
            </form>
          </div>

          <!-- Edit Tab -->
          <div id="area-tab-edit" class="area-tab-content hidden">
            <form id="area-edit-form" class="form-grid">
              <label>
                Selecionar Area
                <select id="ae-area-id" required>
                  <option value="">-- Selecione uma area --</option>
                </select>
              </label>
              <label>
                Novo Nome
                <input id="ae-name" type="text" required />
              </label>
              <label>
                Nova Cor
                <input id="ae-color" class="color-input" type="color" value="#1d4ed8" />
              </label>
              <div class="toolbar-actions">
                <button type="submit">Atualizar Area</button>
              </div>
            </form>
          </div>

          <!-- Delete Tab -->
          <div id="area-tab-delete" class="area-tab-content hidden">
            <form id="area-delete-form" class="form-grid">
              <label>
                Selecionar Area
                <select id="ad-area-id" required>
                  <option value="">-- Selecione uma area --</option>
                </select>
              </label>
              <p class="muted small">
                Atencao: a area sera desativada. Indicadores associados nao serao afetados.
              </p>
              <div class="toolbar-actions">
                <button type="submit" class="danger">Apagar Area</button>
              </div>
            </form>
          </div>

          <div class="toolbar-actions">
            <button id="am-close-btn" type="button" class="secondary">Fechar</button>
          </div>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
